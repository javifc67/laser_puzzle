<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyFront" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3c3f4a" />
      <stop offset="100%" stop-color="#1e2026" />
    </linearGradient>
    <linearGradient id="tunnel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000" />
      <stop offset="30%" stop-color="#050608" />
      <stop offset="100%" stop-color="#424757" />
    </linearGradient>
    <radialGradient id="laserGlow" cx="40%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ff1a4a" />
      <stop offset="30%" stop-color="#ff0033" stop-opacity="0.9"/>
      <stop offset="65%" stop-color="#aa0022" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0" />
    </radialGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="12" dy="16" stdDeviation="6" flood-color="#000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <g transform="translate(0, 100)">
    <!-- Base block with shadow (furthest back/up-left for 3D extrusion) -->
    <rect x="-18" y="-78" width="60" height="140" rx="8" fill="#14151a" filter="url(#shadow)" />
    
    <!-- Extrusion / Side panels for 3D depth -->
    <rect x="-15" y="-75" width="60" height="140" rx="8" fill="#1b1c23" />
    <rect x="-12" y="-72" width="60" height="140" rx="8" fill="#22242d" />
    
    <!-- Front face layer -->
    <rect x="-10" y="-70" width="60" height="140" rx="8" fill="url(#bodyFront)" />
    <rect x="-10" y="-70" width="60" height="140" rx="8" fill="none" stroke="#535767" stroke-width="1.5"/>
    <rect x="-6" y="-66" width="52" height="132" rx="5" fill="none" stroke="#111" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Top Highlight Bevel -->
    <path d="M 0 -70 L 40 -70 Q 50 -70 50 -60" fill="none" stroke="#777c91" stroke-width="2" opacity="0.8" />

    <!-- Isometric Hole Tunnel depth effect -->
    <!-- Front Opening -->
    <ellipse cx="20" cy="0" rx="20" ry="46" fill="url(#tunnel)" />
    <ellipse cx="20" cy="0" rx="20" ry="46" fill="none" stroke="#22242d" stroke-width="3" />
    <ellipse cx="20" cy="0" rx="19" ry="45" fill="none" stroke="#000" stroke-width="1.5" opacity="0.5" />
    
    <!-- Middle depth section purely shifted Left for deep connection -->
    <ellipse cx="14" cy="0" rx="15" ry="38" fill="#050608" />
    
    <!-- Deepest section -->
    <ellipse cx="8" cy="0" rx="10" ry="28" fill="#000" />
    
    <!-- Glowing Laser Core -->
    <ellipse cx="12" cy="0" rx="12" ry="26" fill="url(#laserGlow)" />
    
    <!-- Bright hot center dot for realism -->
    <ellipse cx="8" cy="0" rx="3" ry="10" fill="#fff" opacity="0.9" filter="blur(1px)"/>
    <ellipse cx="8" cy="0" rx="1.5" ry="6" fill="#fff" />
  </g>
</svg>
