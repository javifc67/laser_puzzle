<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Wall gradient -->
    <linearGradient id="wallDrop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000000" />
      <stop offset="50%" stop-color="#141518" />
      <stop offset="100%" stop-color="#2a2c33" />
    </linearGradient>
    <radialGradient id="laserGlow" cx="10%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#9ece6a" stop-opacity="1" />
      <stop offset="50%" stop-color="#73daca" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#73daca" stop-opacity="0" />
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="5" dy="0" stdDeviation="5" flood-color="#000" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- We translate to center vertically. The left edge is x=0 (the wall boundary) -->
  <g transform="translate(0, 100)">
    <!-- Base plate that sticks out slightly from the wall edge (x=0) -->
    <!-- The plate extends from 0 to 40 on X -->
    <rect x="-10" y="-50" width="40" height="100" rx="6" fill="#1a1c23" filter="url(#shadow)"/>
    <rect x="-5" y="-45" width="30" height="90" rx="4" fill="#2d2f36" />
    
    <!-- Outer rim of the hole -->
    <ellipse cx="10" cy="0" rx="14" ry="34" fill="#000"/>
    
    <!-- Depth wall simulation -->
    <path d="M 5 -32 C 18 -32, 18 32, 5 32 C -5 32, -5 -32, 5 -32" fill="url(#wallDrop)"/>
    
    <!-- Glowing Laser inside -->
    <ellipse cx="2" cy="0" rx="8" ry="24" fill="url(#laserGlow)"/>
    
    <!-- Screws -->
    <circle cx="10" cy="-35" r="3" fill="#0a0a0c"/>
    <circle cx="10" cy="35" r="3" fill="#0a0a0c"/>
    <circle cx="20" cy="-35" r="2" fill="#444"/>
    <circle cx="20" cy="35" r="2" fill="#444"/>
  </g>
</svg>
